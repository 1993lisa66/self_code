asr:
  device: cpu
  # ASR 识别语言：auto（自动检测）| en（强制英文）| zh（强制中文）| ja 等
  language: auto
  model_size: base
audio:
  channels: 1
  normalize: true
  sample_rate: 16000
global:
  auto_cleanup_cache: true
  max_concurrency:
    # 本地计算（音频提取、VAD、ASR、FFmpeg）多进程并行
    # LLM / TTS 等远程 API 调用已通过文件锁串行化，不会触发限速
    video_processor: 1
llm:
  api_base: https://api.siliconflow.cn/v1
  api_key: 
  model: deepseek-ai/DeepSeek-V3
  fallback_model: deepseek-ai/DeepSeek-V3
  default_request_timeout: 120
  retry_base_delay: 3
  sticky_check_interval: 8

  # ── 各阶段独立模型配置 ──
  # ASR 融合修正
  asr_fixer:
    model: deepseek-ai/DeepSeek-V3
    temperature: 0.1
    max_tokens: 8000
    request_timeout: 120

  # 语义重切分
  resegmenter:
    model: deepseek-ai/DeepSeek-V3
    temperature: 0.1
    max_tokens: 4096
    max_retries: 1
    request_timeout: 120
    batch_size: 20
    overlap: 2
    circuit_breaker_windows: 3
    auto_skip_threshold: 0.70
    skip: false

  # 翻译
  translator:
    model: deepseek-ai/DeepSeek-V3
    temperature: 0.1
    max_retries: 3
    request_timeout: 120
    context_window: 8

  # TTS 文本预处理
  tts_processor:
    model: deepseek-ai/DeepSeek-V3
    temperature: 0.1
    batch_size: 5
    max_retries: 3

  # 章节生成
  chapter_generator:
    model: deepseek-ai/DeepSeek-V3
    temperature: 0.1
    request_timeout: 120

  prompts:
    asr_fix: asr_fix.txt
    chapters: chapters.txt
    resegmentation: resegmentation.txt
    semantic_segmentation: semantic_segmentation.txt
    translation: translation.txt
    tts_prep: tts_prep.txt
paths:
  batches_dir: config/batches
  cache_dir: cache
  log_dir: logs
  output_dir: outputs
  prompts_dir: config/prompts
  terminology_file: config/terminology.json
project:
  name: TransVoice
translate:
  target_language: zh
  # 翻译引擎: llm（大模型翻译，质量高但需 API Key）| google（免费快速，质量中等）
  provider: llm
  # Google 翻译请求间隔（秒），越小越快但可能被封
  google_delay: 0.5
  # LLM 翻译每批处理的片段数（默认 20），太大容易超出 token 限制导致末尾截断
  batch_size: 15
tts:
  # TTS 引擎: edge（微软免费在线语音合成）
  provider: edge
  # ── Edge TTS（微软免费在线语音合成）─────────────────────────
  edge:
    # 中文语音: zh-CN-YunyangNeural, zh-CN-XiaoxiaoNeural, zh-CN-YunxiNeural
    # 英文语音: en-US-AriaNeural, en-US-JennyNeural, en-US-GuyNeural
    voice: zh-CN-YunyangNeural

vad:
  min_silence_duration_ms: 300
  min_speech_duration_ms: 250
video:
  audio_mode: tts_only
  burn_subtitles: false
  codec: libx264
  crf: 23
  preset: fast
  subtitle_font_size: 18
  subtitle_position: bottom
whisperx:
  align: true
  batch_size: 16
  compute_type: float16
  device: cpu
  model: base
