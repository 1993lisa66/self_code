project:
  name: TransVoice

paths:
  input_dir: input
  output_dir: outputs
  cache_dir: cache
  log_dir: logs
  prompts_dir: prompts
  assets_dir: assets
  models_dir: models  # 本地模型存储目录

global:
  max_concurrency:
    asr_selector: 15
    english_translator: 15
    tts_text_processor: 20
    chapter_generator: 1
  video_processing:
    max_parallel_videos: 8  # 同时处理的视频数量 (1-5)
    api_rate_limits:
      llm_per_minute: 15  # LLM API 每分钟最大调用次数
      tts_per_minute: 30  # TTS API 每分钟最大调用次数
  auto_cleanup_cache: true  # 处理完每个视频后自动清理缓存

audio:
  sample_rate: 16000
  channels: 1
  normalize: true

vad:
  min_speech_duration_ms: 250
  min_silence_duration_ms: 300

asr:
  model_id: "iic/speech_paraformer-large-vad-punc_asr_nat-zh-cn-16k-common-vocab8404-pytorch"
  device: cpu
  model_size: base # 更改为 base 以加快测试速度
  voting_models:
    - whisperx
    - glm
  terminology_file: terminology.json

whisperx:
  model: base
  device: cpu
  compute_type: float16
  batch_size: 16
  diarization: true
  min_speakers: 1
  max_speakers: 10
  align: true

llm:
  api_key: "sk-ciflsfsoebgnuzsyhsuciwgvqvqosjkasdtsvphzxwttjqmt"
  api_base: "https://api.siliconflow.cn/v1"
  model: "deepseek-ai/DeepSeek-V3" # 添加全局默认模型
  translator:
    model: "deepseek-ai/DeepSeek-V3"
    temperature: 0.1
    max_retries: 3
  tts_processor:
    model: "deepseek-ai/DeepSeek-V3"
    temperature: 0.1
  chapter_generator:
    model: "deepseek-ai/DeepSeek-V3"
    temperature: 0.1
  prompts:
    asr_fix: asr_fix.txt
    translation: translation.txt
    chapters: chapters.txt
    tts_prep: tts_prep.txt
    resegmentation: resegmentation.txt
    semantic_segmentation: semantic_segmentation.txt

translate:
  target_language: zh

tts:
  provider: edge  # TTS 提供商: edge (Microsoft Edge TTS)
  voice: zh-CN-XiaoxiaoNeural  # 语音选择
  speed_limit: 1.5  # 最大语速倍数（用于时长对齐）
  # speaker_audio_path: "assets/ICT.wav"  # 音色克隆音频（未来功能，暂不使用）

# 所有普通话女声
#zh-CN-XiaoxiaoNeural    # 晓晓 (推荐)
#zh-CN-XiaoyiNeural      # 晓伊
#zh-CN-lunaNeural        # Luna
#zh-CN-XiaochenNeural    # 晓辰
#zh-CN-XiaohanNeural     # 晓涵
#zh-CN-XiaomengNeural    # 晓梦
#zh-CN-XiaomoNeural      # 晓墨
#zh-CN-XiaoqiuNeural     # 晓秋
#zh-CN-XiaoruiNeural     # 晓睿
#zh-CN-XiaoshuangNeural  # 晓双
#zh-CN-XiaoxuanNeural    # 晓萱
#zh-CN-XiaoyanNeural     # 晓颜
#zh-CN-XiaoyouNeural     # 晓悠

#所有普通话男声
#zh-CN-YunxiNeural       # 云希 (推荐)
#zh-CN-YunjianNeural     # 云健
#zh-CN-YunfengNeural     # 云枫
#zh-CN-YunhaoNeural      # 云皓
#zh-CN-YunyangNeural     # 云扬
#zh-CN-YunyeNeural       # 云野
