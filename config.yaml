#视频类型
#zh-CN-XiaoxiaoNeural  教育培训  晓晓
#zh-CN-YunxiNeural 科技产品 云希
#zh-CN-XiaoyiNeural 儿童内容 晓伊
#zh-CN-YunfengNeural 纪录片 云枫
#zh-CN-XiaochenNeural 新闻资讯 晓辰
#zh-CN-XiaoyiNeural 娱乐休闲 晓伊/云野

video:
  subtitle_font_size: 18
  codec: libx264
  crf: 23
  preset: fast
  burn_subtitles: false  # 是否烧录字幕到视频中 (true=烧录, false=不烧录)
  subtitle_position: "bottom"  # 字幕位置: bottom, top, center
  audio_mode: "tts_only"  # 音频模式: tts_only(仅中文配音), mix(混合原声+配音), bgm_mix(背景音乐+配音), original(仅原声)
